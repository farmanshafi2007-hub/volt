<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLT | Secure Chat</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Ionicons for some visuals -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020202; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(26, 26, 26, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        .hidden { display: none !important; }

        /* Loading Overlay */
        #loading-screen { position: fixed; inset: 0; background: #020202; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(99, 102, 241, 0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Container */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; pointer-events: none; }
        .toast { pointer-events: auto; background: #222; color: white; padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; transform: translateX(20px); transition: all 0.3s ease; font-size: 14px; }
        .toast.show { opacity: 1; transform: translateX(0); }

        /* Layout Adjustments */
        @media (max-width: 767px) {
            #sidebar { position: absolute; height: 100%; top: 0; left: 0; }
            #chat-area { width: 100% !important; }
        }
    </style>
</head>
<body class="selection:bg-indigo-500/30">

    <div id="loading-screen">
        <div class="spinner mb-4"></div>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest animate-pulse">Pulse v1.2 Starting...</p>
    </div>

    <div id="toast-container"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-hidden">
        <div class="absolute inset-0 bg-[#020202] z-0"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-indigo-600/10 blur-[120px] rounded-full"></div>
        
        <div class="glass p-10 rounded-[40px] max-w-sm w-full text-center space-y-8 relative z-10 border border-white/10 shadow-2xl">
            <div class="mx-auto w-20 h-20 bg-indigo-600 rounded-[28px] flex items-center justify-center shadow-indigo-500/40 shadow-2xl">
                <ion-icon name="chatbubble-ellipses" class="text-white text-4xl"></ion-icon>
            </div>
            
            <div class="space-y-2">
                <h1 class="text-4xl font-black italic tracking-tighter text-white">VOLT</h1>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest">Enter the Chat</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="user-name-input" placeholder="Your Display Name" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 outline-none focus:border-indigo-500 transition-all text-white text-center font-bold">
                <button id="login-button" class="w-full bg-white text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-100 active:scale-95 transition-all shadow-xl">
                    JOIN THE VOLT
                </button>
            </div>

            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                No sign-up required • Pulse v1.2
            </p>
        </div>
    </div>

    <!-- Main App Screen (Hidden initially) -->
    <div id="app-screen" class="hidden h-screen w-full flex bg-black overflow-hidden relative">
        <!-- Sidebar -->
        <div id="sidebar" class="w-full md:w-96 glass border-r border-white/5 flex flex-col z-20 transition-transform duration-300">
            <!-- Header -->
            <div class="p-6 border-b border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <ion-icon name="flash" class="text-white text-xl"></ion-icon>
                    </div>
                    <span class="text-xl font-black tracking-tighter">VOLT</span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="logout-button" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-slate-400">
                        <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
                    </button>
                    <img id="user-avatar" src="" class="w-10 h-10 rounded-full border border-white/10" alt="Me">
                </div>
            </div>

            <!-- Rooms List -->
            <div id="rooms-container" class="flex-1 overflow-y-auto p-4 space-y-2 hide-scrollbar">
                <!-- Static Room as an example -->
                <div class="p-4 rounded-2xl glass hover:bg-white/5 cursor-pointer transition-all border-indigo-500/50">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-white text-sm">General Room</h3>
                        <span class="text-[10px] text-indigo-400 font-bold uppercase">Public</span>
                    </div>
                </div>
            </div>

            <!-- Join/Create -->
            <div class="p-6 bg-black/40 border-t border-white/5 grid grid-cols-2 gap-3">
                <button id="btn-show-join" class="py-3 bg-white/5 border border-white/10 hover:bg-white/10 text-white font-bold rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2 text-sm">
                    <ion-icon name="enter-outline"></ion-icon> Join
                </button>
                <button id="btn-show-create" class="py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 text-sm">
                    <ion-icon name="add-circle-outline"></ion-icon> Create
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area" class="flex-1 flex flex-col bg-[#050505] relative transform md:translate-x-0">
            <!-- Chat Header -->
            <div id="chat-header" class="p-4 glass border-b border-white/5 flex items-center justify-between z-10">
                <div class="flex items-center gap-4">
                    <button id="btn-back" class="md:hidden p-2 hover:bg-white/5 rounded-lg">
                        <ion-icon name="chevron-back" class="text-2xl"></ion-icon>
                    </button>
                    <div>
                        <h2 id="current-room-name" class="text-lg font-bold text-white">Select a chat</h2>
                        <p id="room-status" class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Active session</p>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4 hide-scrollbar flex flex-col">
                <div class="flex-1"></div> <!-- Spacer -->
                <div class="text-center text-slate-500 text-sm py-10">
                    Select a conversation or start a new one
                </div>
            </div>

            <!-- Input Area -->
            <div id="input-area" class="p-6 glass border-t border-white/5">
                <form id="chat-form" class="relative group">
                    <input 
                        id="message-input"
                        type="text" 
                        placeholder="Type a message..." 
                        class="w-full bg-[#121212] border border-white/5 focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl py-4 px-6 pr-24 text-sm text-white placeholder-slate-600 transition-all outline-none"
                    >
                    <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-2">
                        <button type="submit" class="p-3 bg-indigo-600 text-white rounded-xl shadow-lg hover:bg-indigo-500 transition-all active:scale-90">
                            <ion-icon name="send" class="text-lg"></ion-icon>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Join Modal -->
    <div id="join-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="glass p-8 rounded-[32px] max-w-sm w-full relative z-10 space-y-6 animate-fade-in">
            <div class="space-y-2">
                <h3 class="text-2xl font-black italic tracking-tight">Join Room</h3>
                <p class="text-xs text-slate-500 font-medium">Enter a room code to participate.</p>
            </div>
            <input type="text" id="room-code-input" placeholder="Room Code (e.g. general)" class="w-full bg-black/50 border border-white/10 rounded-xl py-3 px-4 outline-none focus:border-indigo-500 transition-all text-white">
            <div class="flex gap-3 pt-2">
                <button id="btn-close-join" class="flex-1 py-3 bg-white/5 border border-white/10 text-white font-bold rounded-xl active:scale-95">Cancel</button>
                <button id="btn-join-room" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl active:scale-95 shadow-lg shadow-indigo-500/20">Join</button>
            </div>
        </div>
    </div>

    <!-- Create Modal -->
    <div id="create-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="glass p-8 rounded-[32px] max-w-sm w-full relative z-10 space-y-6 animate-fade-in">
            <div class="space-y-2">
                <h3 class="text-2xl font-black italic tracking-tight">Create Room</h3>
                <p class="text-xs text-slate-500 font-medium">Start a new conversation context.</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-indigo-400 px-1">Room Name</label>
                    <input type="text" id="create-room-name" placeholder="Team Sync, Study Group..." class="w-full bg-black/50 border border-white/10 rounded-xl py-3 px-4 outline-none focus:border-indigo-500 transition-all text-white">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-indigo-400 px-1">Description (Optional)</label>
                    <textarea id="create-room-desc" placeholder="What's this room about?" rows="3" class="w-full bg-black/50 border border-white/10 rounded-xl py-3 px-4 outline-none focus:border-indigo-500 transition-all text-white resize-none"></textarea>
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button id="btn-close-create" class="flex-1 py-3 bg-white/5 border border-white/10 text-white font-bold rounded-xl active:scale-95">Cancel</button>
                <button id="btn-create-room" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl active:scale-95 shadow-lg shadow-indigo-500/20">Create</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Scripts -->
    <script type="module" src="script.js"></script>
    <script>
        // Safety timeout to hide loading screen if scripts fail
        setTimeout(() => {
            const ls = document.getElementById('loading-screen');
            if (ls && !ls.classList.contains('hidden')) {
                ls.style.opacity = '0';
                ls.style.pointerEvents = 'none';
                setTimeout(() => ls.classList.add('hidden'), 500);
                document.body.style.overflow = 'auto';
                console.warn("Loading safety timeout triggered.");
            }
        }, 4000); // 4 seconds
    </script>
</body>
</html>
